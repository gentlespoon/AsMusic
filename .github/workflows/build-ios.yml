name: Build iOS

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/build-ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/build-ios.yml"

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Swift 6.3 (ios/AsNavidromeKit/Package.swift) needs a matching Xcode; default on the runner may be older.
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Device SDK only — no iOS Simulator runtime download (avoids runner-images#13853 actool issues).
      - name: Build
        run: |
          xcodebuild clean build -project ios/AsMusic.xcodeproj -scheme AsMusic -sdk iphoneos -destination 'generic/platform=iOS' ONLY_ACTIVE_ARCH=YES CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
